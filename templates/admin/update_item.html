{% extends "admin/base.html" %}
{% block title %}Update Product{% endblock %}
{% block content %}
<div class="card fade-in-up" style="max-width: 600px; margin: 0 auto;">
    <h2>Update Product</h2>
    <form method="POST" action="/admin/update-item/{{ product.product_id }}" enctype="multipart/form-data">
        <div>
            <label>Product Name:</label>
            <input type="text" name="name" value="{{ product.name }}" required>
        </div>
        <div>
            <label>Description:</label>
            <textarea name="description" required>{{ product.description }}</textarea>
        </div>
        <div>
            <label>Category:</label>
            <input type="text" name="category" value="{{ product.category }}" required>
        </div>
        <div>
            <label>Price:</label>
            <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
        </div>
        <div class="mt-4">
            <label>Old Image:</label><br>
            <img src="/static/uploads/product_images/{{ product.image }}" width="120" class="mt-4 mb-4">
        </div>
        <div>
            <label>Choose New Image (Optional):</label>
            <input type="file" name="image" accept="image/*">
        </div>
        <div class="flex-gap mt-4">
            <button type="submit" class="btn btn-primary">Update Product</button>
            <a href="/admin/item-list" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
