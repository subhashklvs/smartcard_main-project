{% extends "admin/base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
<div class="card fade-in-up" style="max-width: 600px; margin: 0 auto;">
    <h2>Add New Product</h2>
    <form method="POST" action="/admin/add-item" enctype="multipart/form-data">
        <div>
            <label>Product Name:</label>
            <input type="text" name="name" required>
        </div>
        <div>
            <label>Description:</label>
            <textarea name="description" required></textarea>
        </div>
        <div>
            <label>Category:</label>
            <input type="text" name="category" required>
        </div>
        <div>
            <label>Price:</label>
            <input type="number" step="0.01" name="price" required>
        </div>
        <div>
            <label>Product Image:</label>
            <input type="file" name="image" accept="image/*" required>
        </div>
        <div class="flex-gap mt-4">
            <button type="submit" class="btn btn-primary"><i class="ph ph-plus"></i> Add Product</button>
            <a href="/admin/item-list" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
