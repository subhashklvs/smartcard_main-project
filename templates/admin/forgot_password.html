{% extends "admin/base.html" %}
{% block title %}Forgot Password - Admin{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        position: relative;
    }
    .auth-blob-1 {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
        top: -50px;
        left: 20%;
        opacity: 0.5;
        filter: blur(50px);
        z-index: 0;
        animation: float 6s infinite ease-in-out;
    }
    .auth-card {
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 1;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .auth-header i {
        font-size: 3rem;
        color: var(--accent-primary);
        margin-bottom: 10px;
        display: inline-block;
    }
    .input-group {
        position: relative;
        margin-bottom: 20px;
    }
    .input-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 1.2rem;
    }
    .input-group input {
        padding-left: 45px;
        background: rgba(15, 23, 42, 0.5);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .input-group input:focus {
        background: rgba(15, 23, 42, 0.8);
        border-color: var(--accent-primary);
    }
    .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
        color: var(--text-muted);
    }
    .auth-footer a {
        color: var(--accent-primary);
        font-weight: 600;
    }
</style>

<div class="auth-wrapper fade-in-up">
    <div class="auth-blob-1"></div>
    
    <div class="auth-card">
        <div class="auth-header">
            <i class="ph ph-key"></i>
            <h2 style="margin: 0; font-size: 1.8rem;">Forgot Password</h2>
            <p style="color: var(--text-muted); margin-top: 5px; font-size: 0.95rem;">Enter your email to receive a password reset link.</p>
        </div>
        
        <form method="POST" action="/admin/forgot-password">
            <div class="input-group">
                <i class="ph ph-envelope-simple"></i>
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 12px; padding: 12px; font-size: 1rem; margin-top: 10px;">
                Send Reset Link
            </button>
        </form>
        
        <div class="auth-footer">
            Remember your password? <a href="/admin-login">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
