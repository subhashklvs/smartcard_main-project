{% extends "superadmin/base.html" %}

{% block title %}Forgot Master Password - SmartCart{% endblock %}

{% block content %}
<style>
    .auth-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 500px;
        margin: 40px auto;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .auth-header i {
        font-size: 3rem;
        color: #8b5cf6;
        margin-bottom: 10px;
        display: inline-block;
    }
    
    .auth-header h2 {
        color: #ffffff;
        font-size: 1.8rem;
        font-weight: 800;
        margin: 0 0 5px 0;
    }
    
    .auth-header p {
        color: #cbd5e1;
        font-size: 0.95rem;
    }
    
    .custom-form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
    }
    
    .custom-form-group label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        margin: 0;
    }
    
    .input-with-icon {
        position: relative;
    }
    
    .input-with-icon i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1.1rem;
    }
    
    .input-with-icon input {
        width: 100%;
        padding: 12px 12px 12px 40px !important;
        border-radius: 10px !important;
        background: rgba(15, 23, 42, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #ffffff !important;
        font-size: 0.95rem !important;
        transition: all 0.3s ease;
    }
    
    .input-with-icon input:focus {
        border-color: #8b5cf6 !important;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2) !important;
        outline: none;
    }
    
    .submit-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #f43f5e, #8b5cf6);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    
    .submit-btn:hover {
        background: linear-gradient(135deg, #e11d48, #7c3aed);
        box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
        transform: translateY(-1px);
    }
    
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #cbd5e1;
        font-size: 0.9rem;
        text-decoration: none;
        transition: color 0.3s;
    }
    
    .back-link:hover {
        color: #ffffff;
    }
</style>

<div class="fade-in-up">
    <div class="auth-card">
        <div class="auth-header">
            <i class="ph-fill ph-lock-key"></i>
            <h2>Master Password Reset</h2>
            <p>Enter your master email address to receive a password reset link.</p>
        </div>
        
        <form method="POST" action="/superadmin/forgot-password">
            <div class="custom-form-group">
                <label>Master Email Address <span style="color:#ef4444">*</span></label>
                <div class="input-with-icon">
                    <i class="ph ph-envelope-simple"></i>
                    <input type="email" name="email" placeholder="Enter your master email" required>
                </div>
            </div>
            
            <button type="submit" class="submit-btn"><i class="ph-bold ph-paper-plane-tilt"></i> Send Reset Link</button>
        </form>
        
        <a href="/superadmin-login" class="back-link"><i class="ph-bold ph-arrow-left"></i> Back to Master Login</a>
    </div>
</div>
{% endblock %}
