{% extends "admin/base.html" %}
{% block title %}Product Details{% endblock %}
{% block content %}
<div class="card fade-in-up" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2>Product Details</h2>
    
    <div style="margin: 20px 0;">
        <img src="/static/uploads/product_images/{{ product.image }}" width="250" style="border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    </div>
    
    <div style="text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 20px; color: #ffffff;">
        <p><strong>Name:</strong> <span style="color: #cbd5e1;">{{ product.name }}</span></p>
        <p><strong>Description:</strong> <span style="color: #cbd5e1;">{{ product.description }}</span></p>
        <p><strong>Category:</strong> <span style="color: #cbd5e1;">{{ product.category }}</span></p>
        <p><strong>Price:</strong> <span style="color: var(--success); font-weight: bold; font-size: 1.2rem;">₹{{ product.price }}</span></p>
    </div>
    
    <a href="/admin/item-list" class="btn btn-secondary"><i class="ph ph-arrow-left"></i> Back to List</a>
</div>
{% endblock %}
