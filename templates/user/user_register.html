{% extends "user/user_base.html" %}

{% block title %}Sign Up - SmartCart{% endblock %}

{% block content %}
<div class="auth-box">
    <div class="card glass-effect">
        <h2 style="text-align: center; margin-bottom: 30px;">Create Account</h2>
        
        <form method="POST" action="/user-register">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="ph ph-user-plus"></i> Register
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
            Already have an account? <a href="/user-login" style="color: var(--accent-primary); font-weight: 600;">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
